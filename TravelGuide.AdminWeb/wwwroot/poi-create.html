<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tạo địa điểm — Travel Guide Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .poi-create-shell { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    .poi-create-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .poi-create-gate { text-align: center; padding: 32px 20px; border: 1px dashed var(--gray-200); border-radius: var(--radius-lg); background: var(--gray-50); }
    .poi-create-gate p { margin: 0 0 16px; color: var(--gray-600); max-width: 420px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <div class="poi-create-shell">
    <div class="poi-create-top">
      <a href="index.html" class="btn-outline">← Quay lại danh sách</a>
      <span id="poiCreateRoleHint" class="hint"></span>
    </div>

    <div id="poiCreateGate" class="poi-create-gate">
      <h1 style="margin:0 0 8px;font-size:22px;">Tạo địa điểm mới</h1>
      <p>Bấm nút bên dưới khi bạn muốn nhập form POI. Trang này chỉ dùng để tạo hoặc sửa một địa điểm.</p>
      <button type="button" id="btnShowPoiForm" class="btn-primary" style="min-height:44px;padding:10px 22px;font-size:15px;">＋ Tạo POI khác</button>
    </div>

    <div id="poiCreateFormWrap" class="hidden card card-elevated" style="margin-top:20px;padding:20px;">
      <h2 class="card-title" id="poiCreateFormTitle">Biểu mẫu POI</h2>
      <p class="hint card-desc" id="poiCreateFormSubtitle"></p>
      <form id="poiForm" class="grid-form">
        <input type="hidden" id="poiId">
        <div><label for="nameVi">Tên (VI)</label><input id="nameVi" required></div>
        <div><label for="imagePath">ImagePath</label><input id="imagePath" placeholder="ocoanh.jpg"></div>
        <div class="full"><label for="descVi">Mô tả (VI)</label><textarea id="descVi" required></textarea></div>
        <div><label for="lat">Latitude</label><input id="lat" type="number" step="any" required></div>
        <div><label for="lon">Longitude</label><input id="lon" type="number" step="any" required></div>
        <div><label for="radius">Radius (m)</label><input id="radius" type="number" step="any" value="50" required></div>
        <div><label for="priority">Priority</label><input id="priority" type="number" step="1" value="0" title="Cao hơn = ưu tiên khi nhiều POI trong bán kính"></div>
        <div><label for="price">Giá hiển thị (VND)</label><input id="price" type="number" step="1000" min="0" value="1000" title="Hiển thị trên app; du khách Free trả 1.000đ/lần mở quán (theo chính sách app)"></div>
        <div><label for="tag">Tag</label>
          <select id="tag">
            <option value="quan an">quán ăn</option>
            <option value="quan nuoc">quán nước</option>
            <option value="dia diem du lich">địa điểm du lịch</option>
            <option value="di tich lich su">di tích lịch sử</option>
          </select>
        </div>
        <div class="full"><label for="qrImagePath">QR ImagePath</label><input id="qrImagePath" placeholder="Để trống: tự tạo khi lưu POI mới (ảnh lưu /qrcodes/...)"></div>
        <div class="full"><label for="mapLink">Map link</label><input id="mapLink" placeholder="https://maps.google.com/... hoặc Mapbox"></div>
        <div class="full"><label for="audioUrl">Audio URL</label><input id="audioUrl" placeholder="https://.../audio.mp3 (app phát file trước, lỗi thì TTS)"></div>
        <div class="full" style="display:flex;gap:10px;flex-wrap:wrap;">
          <button type="submit" class="btn-primary">Lưu POI</button>
          <button type="button" id="btnAnotherPoi" class="btn-outline hidden">＋ Tạo POI khác</button>
        </div>
      </form>
    </div>
  </div>
  <script src="poi-create.js?v=1"></script>
</body>
</html>
