<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelGuide - Tai app Android</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f6f8fa;
            color: #1f2328;
            margin: 0;
            padding: 24px;
        }

        .wrap {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 8px 0;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            text-decoration: none;
            background: #0969da;
            color: #fff;
            font-weight: 700;
        }

        .qr {
            margin-top: 20px;
            text-align: center;
        }

        .qr img {
            width: 240px;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            background: #fff;
        }

        .hint {
            color: #57606a;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Tai app TravelGuide cho Android</h1>
        <p>Nhan nut ben duoi de tai APK. Neu quet QR, trang nay se tu dong chuyen den file cai dat.</p>
        <a class="btn" href="/download/android">Tai APK Android</a>

        <div class="qr">
            <img src="/download/android/qr.png" alt="QR tai Android app" />
            <p class="hint">QR dong theo domain hien tai. Dat APK tai WEB/apk/travelguide-latest.apk hoac cau hinh AndroidDownload:ApkUrl.</p>
        </div>
    </div>
</body>
</html>
