<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travel Guide - Chi tiet quan</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
    }
    .hero {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 26px; line-height: 1.2; }
    p { margin: 0; line-height: 1.6; }
    .meta {
      display: inline-block;
      margin: 8px 0 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 600;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text);
      background: #fff;
    }
    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }
    .hint { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p id="state" class="hint">Dang tai du lieu quan...</p>
      <div id="content" hidden>
        <img id="hero" class="hero" alt="Anh quan">
        <h1 id="name"></h1>
        <span id="tag" class="meta"></span>
        <p id="desc"></p>
        <div class="actions">
          <a id="mapLink" class="btn primary" href="#" target="_blank" rel="noopener noreferrer">Mo ban do</a>
          <a id="audioLink" class="btn" href="#" target="_blank" rel="noopener noreferrer">Nghe audio</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getPoiIdFromQuery() {
      var q = new URLSearchParams(window.location.search);
      var id = Number(q.get("id") || 0);
      return Number.isFinite(id) && id > 0 ? id : 0;
    }

    function toAbsoluteUrl(pathOrUrl) {
      var raw = String(pathOrUrl || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      var clean = raw.startsWith("/") ? raw : ("/" + raw);
      return window.location.origin + clean;
    }

    async function loadData() {
      var stateEl = document.getElementById("state");
      var contentEl = document.getElementById("content");
      var id = getPoiIdFromQuery();
      if (!id) {
        stateEl.textContent = "Link QR khong hop le (thieu id dia diem).";
        return;
      }

      try {
        var res = await fetch("/api/public/pois", { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error("Khong tai duoc danh sach quan.");
        var all = await res.json();
        var p = Array.isArray(all) ? all.find(function (x) { return Number(x.id) === id; }) : null;
        if (!p) {
          stateEl.textContent = "Khong tim thay quan nay hoac quan chua duoc dang cong khai.";
          return;
        }

        document.getElementById("name").textContent = p.nameVi || ("Dia diem #" + id);
        document.getElementById("desc").textContent = p.descVi || "Dang cap nhat mo ta...";
        document.getElementById("tag").textContent = p.tag || "Dia diem du lich";

        var hero = document.getElementById("hero");
        var heroUrl = toAbsoluteUrl(p.imagePath);
        if (heroUrl) {
          hero.src = heroUrl;
          hero.hidden = false;
        } else {
          hero.hidden = true;
        }

        var mapBtn = document.getElementById("mapLink");
        var mapUrl = String(p.mapLink || "").trim();
        if (mapUrl) {
          mapBtn.href = mapUrl;
          mapBtn.hidden = false;
        } else {
          mapBtn.hidden = true;
        }

        var audioBtn = document.getElementById("audioLink");
        var audioUrl = toAbsoluteUrl(p.audioUrl);
        if (audioUrl) {
          audioBtn.href = audioUrl;
          audioBtn.hidden = false;
        } else {
          audioBtn.hidden = true;
        }

        stateEl.hidden = true;
        contentEl.hidden = false;
      } catch (err) {
        stateEl.textContent = "Co loi khi tai trang quet QR: " + (err && err.message ? err.message : String(err));
      }
    }

    loadData();
  </script>
</body>
</html>
