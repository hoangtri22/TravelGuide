<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TravelGuide - QR tải APP</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #fff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(640px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 0 0 8px; font-size: 18px; }
    .hint { margin: 0 0 12px; color: var(--muted); font-size: 14px; }
    .qr-wrap {
      display: grid;
      place-items: center;
      min-height: 240px;
      margin: 8px 0 14px;
    }
    #qrImage {
      width: 240px;
      height: 240px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .url {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button, a.btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: var(--primary); color: #fff; }
    .secondary { background: #eef2ff; color: #1f2937; }
    .status { margin: 10px 0 0; min-height: 18px; color: var(--muted); font-size: 13px; }
    hr { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Tải ứng dụng TravelGuide</h1>
    <p class="hint">Quét QR bằng điện thoại để tải ứng dụng trực tiếp.</p>

    <div class="qr-wrap">
      <img id="qrImage" alt="QR tai APK">
    </div>

    <div class="actions">
      <a id="downloadBtn" class="btn primary" target="_blank" rel="noopener">Tai APK</a>
      <button id="copyBtn" class="secondary" type="button">Copy link</button>
    </div>
    <p id="status" class="status"></p>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const qrImage = byId("qrImage");
    const downloadBtn = byId("downloadBtn");
    const statusEl = byId("status");

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    async function loadQrFromServer() {
      setStatus("Đang tải QR...");
      try {
        const res = await fetch("/api/download/apk-info", { cache: "no-store" });
        const raw = await res.text();
        if (!res.ok) throw new Error(raw || ("HTTP " + res.status));
        const data = JSON.parse(raw);
        const url = String(data?.downloadUrl || "").trim();
        const qr = String(data?.qrImagePath || "").trim();
        if (!url || !qr) throw new Error("Server chưa có cấu hình URL PublicPublic.");
        qrImage.src = qr + (qr.includes("?") ? "&" : "?") + "t=" + Date.now();
        downloadBtn.href = url;
        downloadBtn.dataset.downloadUrl = url;
        setStatus("Sẵn sàng. Có thể quét QR để tải.");
      } catch (err) {
        qrImage.removeAttribute("src");
        downloadBtn.removeAttribute("href");
        delete downloadBtn.dataset.downloadUrl;
        setStatus("Không tải được QR từ server: " + (err?.message || String(err)));
      }
    }

    byId("copyBtn").addEventListener("click", async () => {
      const text = String(downloadBtn.dataset.downloadUrl || "").trim();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Đã copy link tải APK.");
      } catch {
        setStatus("Không thể copy tự động. Hãy bấm Tải APK.");
      }
    });

    loadQrFromServer();
  </script>
</body>
</html>
